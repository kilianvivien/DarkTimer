<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Hour marks at 12, 3, 6, 9 -->
  <line x1="16" y1="5.5" x2="16" y2="8" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26.5" y1="16" x2="24" y2="16" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="26.5" x2="16" y2="24" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5.5" y1="16" x2="8" y2="16" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~10 o'clock) -->
  <line x1="16" y1="16" x2="10.5" y2="9" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Second hand / countdown hand in red (pointing to ~2 o'clock) -->
  <line x1="16" y1="16" x2="22" y2="10" stroke="#ff0000" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.8" fill="#ff0000"/>
</svg>
